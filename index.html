<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Go Home</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="manifest.json">
<style>
  body { font-family: 'Inter', system_ui, sans-serif; }
  .title-font { font-family: 'Space Grotesk', sans-serif; }
</style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
<div class="max-w-md mx-auto p-6">

  <div class="flex justify-between items-center mb-8">
    <div class="text-3xl font-semibold tracking-tight title-font">Home Now</div>
    <button onclick="fetchRoutes()" class="px-5 py-2 bg-slate-800 rounded-2xl text-sm">Refresh</button>
  </div>

  <div id="location-status" class="text-sm text-slate-400 mb-6"></div>
  <div id="weather" class="text-xs bg-slate-900 px-4 py-2 rounded-2xl mb-6 text-center"></div>

  <div class="text-center mb-8">
    <div class="text-sm text-slate-400">To Grand Waterfront</div>
    <div id="best-eta" class="text-6xl font-mono font-bold text-emerald-400">—</div>
    <div class="text-sm text-slate-400">min</div>
  </div>

  <div id="routes-list" class="space-y-4"></div>

</div>

<script>
const HOME = { lat: 22.3105, lng: 114.1908 };

async function fetchRoutes() {
  const status = document.getElementById('location-status');
  status.textContent = "Getting location...";

  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
    });

    const currentLat = pos.coords.latitude;
    const currentLng = pos.coords.longitude;
    const distance = Math.random() * 8; // mock distance in km

    status.textContent = `Detected near your area • ${new Date().toLocaleTimeString('en-HK', {hour:'2-digit', minute:'2-digit'})}`;

    const mockRoutes = [
      { type: "Walk", name: "Direct", eta: Math.round(distance * 12), cost: "0", steps: "Walk home directly (under 15 min total)" },
      { type: "Bus", name: "11X or local", eta: 25, cost: "8.6", steps: "Walk 7 min to stop → Bus 18 min → Walk 5 min" },
      { type: "MTR", name: "Short ride", eta: 28, cost: "12", steps: "Walk 10 min to station → MTR 13 min → Walk 5 min" },
      { type: "Taxi", name: "Direct", eta: 15, cost: "\~80", steps: "Taxi \~15 min" }
    ];

    renderRoutes(mockRoutes);
    document.getElementById('weather').textContent = "Clear • 31°C";

  } catch(e) {
    status.textContent = "Location unavailable. Showing general options.";
    // Fallback
    renderRoutes([
      { type: "Bus", name: "11X", eta: 27, cost: "8.6", steps: "Walk 8 min → Bus 19 min → Walk 6 min" },
      { type: "MTR", name: "Kwun Tong Line", eta: 32, cost: "12", steps: "Walk 12 min → MTR 15 min" }
    ]);
  }
}

function renderRoutes(routes) {
  const container = document.getElementById('routes-list');
  container.innerHTML = '';

  const bestEta = routes.length ? Math.min(...routes.map(r => r.eta)) : 25;
  document.getElementById('best-eta').textContent = bestEta;

  routes.forEach(route => {
    const card = document.createElement('div');
    card.className = "bg-slate-900 rounded-3xl p-5 cursor-pointer active:scale-95 transition";
    card.innerHTML = `
      <div class="flex justify-between">
        <div>
          <div class="text-xl font-semibold">${route.type}</div>
          <div class="text-slate-400">${route.name}</div>
        </div>
        <div class="text-right">
          <div class="text-4xl font-mono font-bold text-emerald-400">${route.eta}</div>
          <div class="text-xs">min • $${route.cost}</div>
        </div>
      </div>
      <button onclick="showSteps('${route.steps}')" class="mt-4 w-full py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm">Show Full Steps</button>
    `;
    container.appendChild(card);
  });
}

function showSteps(steps) {
  alert("Full Steps to Grand Waterfront:\n\n" + steps);
}

fetchRoutes();
</script>
</body>
</html>
