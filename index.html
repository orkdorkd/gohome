<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CatchBus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <meta name="theme-color" content="#84cc16">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CatchBus">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .lime-gradient { background: linear-gradient(to bottom right, #bef575, #84cc16); }
        .route-pill { background: linear-gradient(to bottom right, #bef575, #84cc16); }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen pb-10">
    <div class="max-w-md mx-auto">
        <div class="bg-white border-b shadow-sm rounded-3xl mx-3 mt-3">
            <div class="px-4 py-4 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-lime-500 rounded-2xl flex items-center justify-center text-white text-xl">🚌</div>
                    <h1 class="text-4xl font-semibold tracking-tighter">CatchBus</h1>
                </div>
                <div onclick="manualRefresh()" class="flex items-center gap-x-1.5 text-lime-600 cursor-pointer active:scale-95">
                    <i class="fa-solid fa-rotate"></i>
                    <span class="text-xs font-medium">Refresh</span>
                </div>
            </div>
            
            <div class="px-4 pb-4">
                <div class="text-xs font-medium text-zinc-500 px-1 mb-1.5">FROM</div>
                <div class="flex gap-2 bg-white p-1 rounded-3xl border border-zinc-100">
                    <button onclick="switchFrom('Gym')" id="tab-Gym" class="flex-1 py-3 rounded-3xl font-semibold text-sm">🏋️ Gym</button>
                    <button onclick="switchFrom('Work')" id="tab-Work" class="flex-1 py-3 rounded-3xl font-semibold text-sm">🏢 Work</button>
                    <button onclick="switchFrom('Home')" id="tab-Home" class="flex-1 py-3 rounded-3xl font-semibold text-sm">🏠 Home</button>
                </div>
            </div>
        </div>

        <div id="main-content" class="px-4 pt-5 space-y-6"></div>
    </div>

    <script>
        let currentFrom = "Gym";

        const tripsConfig = [
            // Gym
            { from: "Gym", to: "Home", emoji: "🏠", route: "11B", stopId: "C80FB453C9F53569", stopName: "The Latitude" },
            { from: "Gym", to: "Home", emoji: "🏠", route: "85X", stopId: "C80FB453C9F53569", stopName: "The Latitude" },
            { from: "Gym", to: "Work", emoji: "🏢", route: "15", stopId: "C80FB453C9F53569", stopName: "The Latitude" },
            { from: "Gym", to: "Work", emoji: "🏢", route: "85X", stopId: "C80FB453C9F53569", stopName: "The Latitude" },

            // Work
            { from: "Work", to: "Gym", emoji: "🏋️", route: "11X", stopId: "C5888ACE3DDA6B30", stopName: "Hok Yuen Street East" },
            { from: "Work", to: "Home", emoji: "🏠", route: "115", stopId: "C5888ACE3DDA6B30", stopName: "Hok Yuen Street East" },
            { from: "Work", to: "Home", emoji: "🏠", route: "5D", stopId: "C5888ACE3DDA6B30", stopName: "Hok Yuen Street East" },

            // Home
            { from: "Home", to: "Gym", emoji: "🏋️", route: "11B", stopId: "F088E9BC1B13B13D", stopName: "Kowloon City Ferry Bus Terminus" },
            { from: "Home", to: "PLK LMC", emoji: "👧", route: "75X", stopId: "C72D7C053FC3AEBB", stopName: "Kowloon City Ferry Bus Terminus" },
            { from: "Home", to: "PLK LMC", emoji: "👧", route: "85", stopId: "1D0E096C4E9766C6", stopName: "Kowloon City Ferry Bus Terminus" },
            { from: "Home", to: "PLK TAY", emoji: "👦", route: "12A", stopId: "5396072459507B7F", stopName: "Grand Waterfront" },
            { from: "Home", to: "PLK TAY", emoji: "👦", route: "85X", stopId: "5396072459507B7F", stopName: "Grand Waterfront" },
            { from: "Home", to: "PLK TAY", emoji: "👦", route: "5D", stopId: "5396072459507B7F", stopName: "Grand Waterfront" }
        ];

        let etaCache = {};

        function calculateMins(etaStr) {
            if (!etaStr) return null;
            const mins = Math.round((new Date(etaStr) - new Date()) / 60000);
            return mins > 0 ? mins : 0;
        }

        async function fetchStopEta(stopId) {
            try {
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
                const json = await res.json();
                etaCache[stopId] = json.data || [];
            } catch (e) {
                etaCache[stopId] = [];
            }
        }

        function createCard(trip) {
            const etas = (etaCache[trip.stopId] || []).filter(e => e.route && e.route.toUpperCase() === trip.route.toUpperCase()).slice(0, 3);
            const firstMins = etas.length ? calculateMins(etas[0].eta) : null;
            let color = "text-zinc-500";
            if (firstMins !== null) {
                if (firstMins <= 3) color = "text-red-600";
                else if (firstMins <= 8) color = "text-amber-600";
                else if (firstMins <= 15) color = "text-lime-600";
            }

            let cardHTML = '<div class="bg-white rounded-3xl shadow-sm border border-zinc-100 overflow-hidden">';
            cardHTML += '<div class="px-5 pt-5 pb-4">';
            cardHTML += '<div class="flex items-start justify-between">';
            cardHTML += '<div class="route-pill text-white font-bold text-4xl w-20 h-20 flex items-center justify-center rounded-2xl">' + trip.route + '</div>';
            cardHTML += '<div class="text-right">';
            cardHTML += '<div class="text-5xl font-bold ' + color + '">' + (firstMins === null ? '—' : firstMins) + '</div>';
            cardHTML += '<div class="text-xs text-zinc-500">min to catch</div>';
            cardHTML += '</div></div>';
            cardHTML += '<div class="mt-4 flex items-center gap-x-3">';
            cardHTML += '<span class="text-3xl">' + trip.emoji + '</span>';
            cardHTML += '<div><div class="font-semibold text-lg">To ' + trip.to + '</div>';
            cardHTML += '<div class="text-xs text-zinc-500">' + trip.stopName + '</div></div></div>';
            cardHTML += '</div>';

            cardHTML += '<div class="border-t bg-zinc-50 px-5 py-3 text-sm">';
            if (etas.length === 0) {
                cardHTML += '<div class="text-center py-3 text-zinc-400 text-sm">No upcoming ETAs</div>';
            } else {
                for (let i = 0; i < etas.length; i++) {
                    const m = calculateMins(etas[i].eta);
                    const rmk = etas[i].rmk_en ? '<span class="text-amber-600 text-xs ml-2">' + etas[i].rmk_en + '</span>' : '';
                    cardHTML += '<div class="flex justify-between items-center py-1 ' + (i > 0 ? 'opacity-70' : '') + '">';
                    cardHTML += '<div><span class="text-xs bg-white px-2 py-0.5 rounded-full border">Next ' + (i+1) + '</span>' + rmk + '</div>';
                    cardHTML += '<div class="font-semibold">' + m + ' min</div></div>';
                }
            }
            cardHTML += '</div></div>';

            return cardHTML;
        }

        async function render() {
            const main = document.getElementById("main-content");
            main.innerHTML = `<div class="flex justify-center py-16"><div class="animate-spin w-8 h-8 border-4 border-lime-500 border-t-transparent rounded-full"></div></div>`;

            const stops = [...new Set(tripsConfig.filter(t => t.from === currentFrom).map(t => t.stopId))];
            await Promise.all(stops.map(fetchStopEta));

            let html = "";
            const groups = {};
            tripsConfig.filter(t => t.from === currentFrom).forEach(t => {
                if (!groups[t.to]) groups[t.to] = { emoji: t.emoji, trips: [] };
                groups[t.to].trips.push(t);
            });

            let order = Object.keys(groups);
            if (currentFrom === "Home") order = ["Gym", "PLK LMC", "PLK TAY"];

            order.forEach(dest => {
                const g = groups[dest];
                if (!g) return;
                html += `<div class="mb-8">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <div>
                            <div class="text-xs uppercase tracking-widest text-lime-600 font-medium">TO</div>
                            <div class="text-2xl font-semibold">${dest}</div>
                        </div>
                        <span class="text-4xl">${g.emoji}</span>
                    </div>`;
                g.trips.forEach(trip => html += createCard(trip));
                html += '</div>';
            });

            main.innerHTML = html || '<div class="text-center py-12 text-zinc-400">No routes configured</div>';

            // Fix tab highlighting
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
                const isActive = btn.id === `tab-${currentFrom}`;
                btn.classList.toggle('lime-gradient', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('shadow-md', isActive);
            });
        }

        function switchFrom(from) {
            currentFrom = from;
            render();
        }

        function manualRefresh() {
            render();
        }

        // Initial load
        document.getElementById("tab-Gym").classList.add("lime-gradient", "text-white", "shadow-md");
        render();
        setInterval(render, 45000);
    </script>
</body>
</html>
