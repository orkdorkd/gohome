<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Home Now</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="manifest.json">
<style>
  body { font-family: 'Inter', system_ui, sans-serif; }
  .title-font { font-family: 'Space Grotesk', sans-serif; }
</style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
<div class="max-w-md mx-auto p-6">

  <div class="flex justify-between items-center mb-8">
    <div class="text-3xl font-semibold tracking-tight title-font">Home Now</div>
  </div>

  <!-- Two buttons -->
  <div class="grid grid-cols-2 gap-3 mb-8">
    <button onclick="getCurrentLocation()" 
            class="py-4 bg-emerald-600 hover:bg-emerald-500 rounded-3xl font-medium text-lg active:scale-95 transition">
      📍 Get Current Location
    </button>
    <button onclick="inputManualLocation()" 
            class="py-4 bg-slate-700 hover:bg-slate-600 rounded-3xl font-medium text-lg active:scale-95 transition">
      ✍️ Input Location
    </button>
  </div>

  <div id="location-status" class="text-sm text-slate-400 mb-6"></div>
  <div id="weather" class="text-xs bg-slate-900 px-4 py-2 rounded-2xl mb-6 text-center"></div>

  <div class="text-center mb-8">
    <div class="text-sm text-slate-400">To Grand Waterfront</div>
    <div id="best-eta" class="text-6xl font-mono font-bold text-emerald-400">—</div>
    <div class="text-sm text-slate-400">min</div>
  </div>

  <div id="routes-list" class="space-y-4"></div>

</div>

<script>
let currentMockLocation = "Strength Culture, Central";

async function getCurrentLocation() {
  const status = document.getElementById('location-status');
  status.textContent = "Getting GPS location...";

  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000 });
    });
    currentMockLocation = "Your current location";
    status.textContent = `GPS acquired • ${new Date().toLocaleTimeString('en-HK', {hour:'2-digit', minute:'2-digit'})}`;
    fetchRoutes();
  } catch(e) {
    status.textContent = "GPS unavailable. Using last location.";
    fetchRoutes();
  }
}

function inputManualLocation() {
  const location = prompt("Enter your current location (e.g. IFC Mall, Airside, 1 Hok Cheung Street):", currentMockLocation);
  if (location) {
    currentMockLocation = location;
    document.getElementById('location-status').textContent = `Manual: ${location}`;
    fetchRoutes();
  }
}

async function fetchRoutes() {
  const status = document.getElementById('location-status');
  if (!status.textContent.includes("GPS") && !status.textContent.includes("Manual")) {
    status.textContent = `Near ${currentMockLocation}`;
  }

  // Realistic mock from Central area
  const mockRoutes = [
    { type: "Bus", name: "11X / local", eta: 32, cost: "9.5", steps: "Walk 6 min to stop → Bus 22 min → Walk 7 min home" },
    { type: "MTR", name: "Tsuen Wan + Kwun Tong", eta: 37, cost: "14", steps: "Walk 8 min to Central → MTR 22 min → Walk 7 min" },
    { type: "Taxi", name: "Direct", eta: 22, cost: "\~110", steps: "Taxi \~22 min" }
  ];

  renderRoutes(mockRoutes);
  document.getElementById('weather').textContent = "Clear • 31°C";
}

function renderRoutes(routes) {
  const container = document.getElementById('routes-list');
  container.innerHTML = '';

  const bestEta = Math.min(...routes.map(r => r.eta));
  document.getElementById('best-eta').textContent = bestEta;

  routes.forEach(route => {
    const card = document.createElement('div');
    card.className = "bg-slate-900 rounded-3xl p-5 cursor-pointer active:scale-95 transition";
    card.innerHTML = `
      <div class="flex justify-between items-start">
        <div>
          <div class="text-xl font-semibold">${route.type}</div>
          <div class="text-slate-400">${route.name}</div>
        </div>
        <div class="text-right">
          <div class="text-4xl font-mono font-bold text-emerald-400">${route.eta}</div>
          <div class="text-xs text-slate-400">min • $${route.cost}</div>
        </div>
      </div>
      <button onclick="showSteps('${route.steps}')" class="mt-4 w-full py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium">Show Full Steps</button>
    `;
    container.appendChild(card);
  });
}

function showSteps(steps) {
  alert("Full Steps to Grand Waterfront:\n\n" + steps);
}

fetchRoutes();
</script>
</body>
</html>
