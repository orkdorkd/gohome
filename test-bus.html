<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Test: Work to Home</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-6">
<div class="max-w-md mx-auto">

  <h1 class="text-3xl font-bold mb-8">Work → Home Bus Test</h1>

  <div id="status" class="mb-6 text-sm">Fetching real bus data from your stops...</div>

  <div id="routes" class="space-y-6"></div>

</div>

<script>
async function loadTestData() {
  const status = document.getElementById('status');
  const container = document.getElementById('routes');

  try {
    // Test with one of your home stops
    const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/HH781'); // Bailey Street - work area
    const json = await res.json();
    const data = json.data || [];

    container.innerHTML = '<h2 class="text-xl font-semibold mb-4">Real buses from work area</h2>';

    data.slice(0,10).forEach(item => {
      const eta = Math.round((new Date(item.eta) - new Date()) / 60000) || 20;
      const div = document.createElement('div');
      div.className = "bg-slate-900 rounded-3xl p-5";
      div.innerHTML = `
        <div class="flex justify-between">
          <div>
            <div class="text-2xl font-bold">${item.route}</div>
            <div class="text-slate-400">${item.dest_en || 'Towards Home'}</div>
          </div>
          <div class="text-right">
            <div class="text-5xl font-mono font-bold text-emerald-400">${eta}</div>
            <div class="text-xs">min</div>
          </div>
        </div>
      `;
      container.appendChild(div);
    });

  } catch(e) {
    status.textContent = "Error loading real data. Showing mock.";
    container.innerHTML = "<p>Real API call failed. Mock data would go here.</p>";
  }
}

loadTestData();
</script>
</body>
</html>
